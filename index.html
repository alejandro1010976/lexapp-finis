<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexApp - Finis Terrae</title>
    
    <!-- Scripts de carga garantizada (Iguales a la versión morada) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #00ced1; font-family: 'Inter', sans-serif; margin: 0; padding: 0; color: black; overflow: hidden; }
        .shadow-hard { box-shadow: 10px 10px 0px 0px rgba(0,0,0,1); }
        .btn-turquesa { background: black; color: #00ced1; padding: 20px 40px; border-radius: 20px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-turquesa:hover { transform: scale(1.05); }
        input { border: 4px solid black !important; border-radius: 15px !important; outline: none !important; }
    </style>
</head>
<body>

    <div id="root">
        <!-- Pantalla de carga manual por si React demora -->
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
            <h1 style="font-family: 'Playfair Display', serif; font-size: 60px; font-style: italic;">LexApp</h1>
            <p style="font-weight: 900; text-transform: uppercase; letter-spacing: 4px; margin-top: 20px;">Sincronizando con Santiago...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // TUS LLAVES REALES
        const firebaseConfig = {
            apiKey: "AIzaSyDW88ZLRlviHhKkem670HHzRTyVSRM3RY8",
            authDomain: "lexapp-60f9b.firebaseapp.com",
            projectId: "lexapp-60f9b",
            storageBucket: "lexapp-60f9b.firebasestorage.app",
            messagingSenderId: "1068688632619",
            appId: "1:1068688632619:web:a36a96895d7ede1645b36e"
        };

        const APP_UID = 'lex-app-finis-2026';

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('biblioteca');
            const [msgs, setMsgs] = useState([]);
            const [data, setData] = useState([]);
            const [input, setInput] = useState("");
            const chatEnd = useRef(null);

            useEffect(() => {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();

                const unsubAuth = auth.onAuthStateChanged(u => {
                    setUser(u);
                });

                // RUTAS CORREGIDAS (Número impar de segmentos: artifacts/id/public/data/coleccion)
                const chatPath = `artifacts/${APP_UID}/public/data/mensajes`;
                const docsPath = `artifacts/${APP_UID}/public/data/archivos`;

                // Cargar chat en tiempo real
                const unsubChat = db.collection(chatPath)
                    .onSnapshot(snap => {
                        const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                        list.sort((a,b) => (a.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                        setMsgs(list);
                    }, err => console.error("Error Chat:", err));

                // Cargar biblioteca en tiempo real
                const unsubDocs = db.collection(docsPath)
                    .onSnapshot(snap => {
                        setData(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    }, err => console.error("Error Biblioteca:", err));

                return () => { 
                    unsubAuth(); 
                    unsubChat(); 
                    unsubDocs();
                };
            }, []);

            useEffect(() => {
                if (chatEnd.current) chatEnd.current.scrollIntoView({ behavior: 'smooth' });
            }, [msgs]);

            const login = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                firebase.auth().signInWithPopup(provider).catch(e => alert("Error: " + e.message));
            };

            const send = async () => {
                if(!input.trim() || !user) return;
                const txt = input; setInput("");
                try {
                    await firebase.firestore().collection(`artifacts/${APP_UID}/public/data/mensajes`).add({
                        text: txt,
                        user: user.displayName,
                        uid: user.uid,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) {
                    console.error("Error al enviar:", e);
                }
            };

            const upload = async () => {
                if (!user) return;
                const n = prompt("Nombre de la materia:");
                if(!n) return;
                try {
                    await firebase.firestore().collection(`artifacts/${APP_UID}/public/data/archivos`).add({
                        titulo: n.toUpperCase(),
                        categoria: "GENERAL",
                        autor: user.displayName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) {
                    console.error("Error al subir:", e);
                }
            };

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 text-center">
                        <h1 style={{fontFamily: 'Playfair Display'}} className="text-9xl font-black italic mb-4">LexApp</h1>
                        <p className="font-black uppercase tracking-[0.5em] mb-12 opacity-50 text-xs text-black">Nube Santiago • Universidad Finis Terrae</p>
                        <div className="bg-white border-[10px] border-black p-12 rounded-[60px] shadow-hard max-w-md w-full">
                            <button onClick={login} className="btn-turquesa w-full text-xl uppercase italic">
                                Entrar con Gmail
                            </button>
                            <p className="mt-8 text-[9px] font-black opacity-30 uppercase">Acceso Restringido Estudiantes</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-white text-black overflow-hidden">
                    {/* SIDEBAR */}
                    <nav className="w-80 bg-[#00ced1] border-r-8 border-black p-8 flex flex-col">
                        <h1 className="text-5xl font-serif font-black italic mb-10">LexApp</h1>
                        <div className="flex-grow space-y-4 font-black text-sm uppercase italic">
                            <button onClick={() => setView('biblioteca')} className={`w-full text-left p-4 rounded-xl ${view === 'biblioteca' ? 'bg-black text-[#00ced1] shadow-hard' : 'hover:bg-black/10'}`}>
                                📂 Biblioteca
                            </button>
                            <button onClick={() => setView('chat')} className={`w-full text-left p-4 rounded-xl ${view === 'chat' ? 'bg-black text-[#00ced1] shadow-hard' : 'hover:bg-black/10'}`}>
                                💬 Consultor IA
                            </button>
                        </div>
                        <div className="mt-auto bg-black p-4 rounded-3xl flex items-center gap-3 text-white">
                            <img src={user.photoURL} className="w-10 h-10 rounded-full border-2 border-[#00ced1]" referrerPolicy="no-referrer" />
                            <div className="truncate">
                                <p className="text-[10px] font-black uppercase text-[#00ced1]">{user.displayName}</p>
                                <button onClick={() => firebase.auth().signOut()} className="text-[8px] opacity-60 underline">SALIR</button>
                            </div>
                        </div>
                    </nav>

                    {/* MAIN */}
                    <main className="flex-grow p-12 overflow-y-auto">
                        <header className="flex justify-between items-end mb-12">
                            <h2 className="text-8xl font-serif font-black italic border-b-[15px] border-[#00ced1] inline-block uppercase leading-none">{view}</h2>
                            {view === 'biblioteca' && (
                                <button onClick={upload} className="bg-black text-[#00ced1] px-8 py-4 rounded-xl font-black uppercase italic shadow-lg hover:scale-105 transition-all">
                                    + Subir
                                </button>
                            )}
                        </header>
                        
                        {view === 'biblioteca' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {data.length === 0 ? (
                                    <div className="col-span-2 text-center py-20 opacity-20 font-black text-4xl uppercase italic">
                                        Nube Vacía
                                    </div>
                                ) : (
                                    data.map(m => (
                                        <div key={m.id} className="p-10 border-8 border-black rounded-[50px] shadow-hard bg-white italic font-black text-4xl">
                                            <span className="text-xs bg-black text-[#00ced1] px-2 py-1 rounded not-italic font-black">{m.categoria}</span>
                                            <p className="mt-4 uppercase">{m.titulo}</p>
                                            <p className="text-[10px] opacity-40 mt-4 not-italic">Autor: {m.autor}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        ) : (
                            <div className="h-[600px] flex flex-col border-8 border-black rounded-[50px] overflow-hidden bg-gray-50 shadow-hard">
                                <div className="flex-grow p-8 overflow-y-auto space-y-4">
                                    {msgs.map((m, i) => (
                                        <div key={i} className={`flex ${m.uid === user.uid ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-4 rounded-2xl max-w-[80%] border-4 border-black ${m.uid === user.uid ? 'bg-black text-white' : 'bg-[#00ced1] font-bold'}`}>
                                                <p className="text-[8px] opacity-40 uppercase mb-1">{m.user}</p>
                                                <p>{m.text}</p>
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={chatEnd} />
                                </div>
                                <div className="p-6 bg-white border-t-8 border-black flex gap-4">
                                    <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && send()} className="flex-grow p-4 font-black uppercase text-sm" placeholder="Escribe al grupo..." />
                                    <button onClick={send} className="bg-black text-[#00ced1] p-4 rounded-xl font-black">ENVIAR</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
