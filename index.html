<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexApp - Finis Terrae Cloud</title>
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --color-principal: #00ced1; 
            --color-fondo: #ffffff;      
            --color-texto: #000000;      
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--color-fondo); color: var(--color-texto); margin: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .shadow-hard { box-shadow: 10px 10px 0px 0px var(--color-texto); }
        .active-tab { background-color: var(--color-texto) !important; color: var(--color-principal) !important; transform: translateX(10px); }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--color-principal); border: 2px solid var(--color-texto); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURACIÓN DE TU PROYECTO (PEGA TUS LLAVES AQUÍ) ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const appId = 'lex-app-finis-2026';
        let db, auth;
        let isFirebaseReady = false;

        // Inicialización segura
        try {
            if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "TU_API_KEY") {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                isFirebaseReady = true;
            }
        } catch (e) { console.error("Error Firebase:", e); }

        function App() {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('biblioteca');
            const [materias, setMaterias] = useState([]);
            const [msgs, setMsgs] = useState([]);
            const [input, setInput] = useState("");
            const chatEnd = useRef(null);

            useEffect(() => {
                if (!isFirebaseReady) return;

                // 1. Auth Listener
                const unsubAuth = auth.onAuthStateChanged(u => setUser(u));

                // 2. Data Listener (Rutas según Regla 1)
                const dataPath = `artifacts/${appId}/public/data`;
                
                const unsubMaterias = db.collection(dataPath).doc('materias_col').collection('lista')
                    .onSnapshot(snap => {
                        const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                        setMaterias(list);
                    });

                const unsubChat = db.collection(dataPath).doc('chat_col').collection('mensajes')
                    .onSnapshot(snap => {
                        const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        list.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                        setMsgs(list);
                    });

                return () => { unsubAuth(); unsubMaterias(); unsubChat(); };
            }, []);

            useEffect(() => chatEnd.current?.scrollIntoView({ behavior: 'smooth' }), [msgs]);

            const handleLogin = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(e => alert("Habilita Google Login en Firebase Console"));
            };

            const handleUpload = async () => {
                const nombre = prompt("Nombre de la materia:");
                if (!nombre) return;
                const cat = (prompt("Categoría (CIVIL/PROCESAL):") || "GENERAL").toUpperCase();
                
                const dataPath = `artifacts/${appId}/public/data`;
                await db.collection(dataPath).doc('materias_col').collection('lista').add({
                    t: nombre, cat, user: user.displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const sendChat = async () => {
                if (!input.trim()) return;
                const t = input; setInput("");
                const dataPath = `artifacts/${appId}/public/data`;
                await db.collection(dataPath).doc('chat_col').collection('mensajes').add({
                    text: t, user: user.displayName, uid: user.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-[#00ced1] p-6 text-center">
                        <h1 className="text-7xl font-serif font-black italic mb-4">LexApp</h1>
                        <p className="mb-10 font-bold uppercase tracking-widest opacity-70 italic">Nube Jurídica Activa (Santiago)</p>
                        <button onClick={handleLogin} className="bg-black text-[#00ced1] px-10 py-5 rounded-[30px] font-black shadow-hard hover:scale-105 transition-all flex items-center gap-3">
                            <i data-lucide="log-in"></i> INGRESAR CON GMAIL
                        </button>
                        {!isFirebaseReady && <p className="mt-8 text-[10px] bg-white/30 p-2 rounded">⚠️ FALTA CONFIGURAR LLAVES DE FIREBASE EN EL CÓDIGO</p>}
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    <nav className="w-80 bg-[#00ced1] border-r-8 border-black p-8 flex flex-col z-20">
                        <h1 className="text-5xl font-serif font-black italic mb-10 tracking-tighter">LexApp</h1>
                        <div className="space-y-4 flex-grow">
                            {['biblioteca', 'consultor', 'examen', 'amigos'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`w-full text-left p-5 font-black uppercase text-sm rounded-2xl transition-all border-4 border-transparent hover:border-black ${tab === t ? 'active-tab shadow-hard' : ''}`}>
                                    {t}
                                </button>
                            ))}
                        </div>
                        <div className="mt-auto bg-black p-4 rounded-3xl text-[#00ced1] flex items-center gap-3">
                            <img src={user.photoURL} className="w-10 h-10 rounded-full border-2 border-[#00ced1]" />
                            <div className="truncate">
                                <p className="text-[10px] font-black uppercase truncate">{user.displayName}</p>
                                <button onClick={() => auth.signOut()} className="text-[8px] opacity-60 hover:underline uppercase font-bold">Cerrar Sesión</button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow p-12 overflow-y-auto bg-white">
                        <header className="flex justify-between items-end mb-16">
                            <h2 className="text-8xl font-serif font-black uppercase italic border-b-[15px] border-[#00ced1] leading-none">{tab}</h2>
                            <button onClick={handleUpload} className="bg-black text-[#00ced1] px-8 py-4 rounded-3xl font-black shadow-hard hover:translate-y-[-4px] active:translate-y-0 transition-all">+ SUBIR</button>
                        </header>

                        <div className="animate-in">
                            {tab === 'biblioteca' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                    {materias.map(m => (
                                        <div key={m.id} className="p-10 border-[8px] border-black rounded-[50px] hover:bg-[#00ced1] transition-all shadow-hard group cursor-pointer">
                                            <span className="bg-black text-[#00ced1] text-[10px] font-black px-2 py-1 rounded mb-4 inline-block">{m.cat}</span>
                                            <h3 className="text-4xl font-serif font-black italic mb-4 uppercase">{m.t}</h3>
                                            <p className="text-[9px] font-bold opacity-40 uppercase tracking-widest">Por: {m.user}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {tab === 'consultor' && (
                                <div className="h-[650px] flex flex-col border-8 border-black rounded-[50px] overflow-hidden bg-gray-50 shadow-hard">
                                    <div className="flex-grow p-10 overflow-y-auto space-y-6">
                                        {msgs.map((m, i) => (
                                            <div key={i} className={`flex ${m.uid === user.uid ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`p-6 rounded-[40px] max-w-[85%] border-4 border-black ${m.uid === user.uid ? 'bg-black text-white shadow-lg' : 'bg-[#00ced1] font-bold shadow-sm'}`}>
                                                    <p className="text-[8px] font-black uppercase opacity-40 mb-2">{m.user}</p>
                                                    <p className="text-sm leading-relaxed">{m.text}</p>
                                                </div>
                                            </div>
                                        ))}
                                        <div ref={chatEnd} />
                                    </div>
                                    <div className="p-8 bg-white border-t-[8px] border-black flex gap-5">
                                        <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendChat()} className="flex-grow p-6 border-4 border-black rounded-3xl font-black outline-none focus:bg-cyan-50" placeholder="Escribe al grupo..." />
                                        <button onClick={sendChat} className="bg-black text-[#00ced1] p-6 rounded-3xl"><i data-lucide="send"></i></button>
                                    </div>
                                </div>
                            )}
                            
                            {tab === 'amigos' && (
                                <div className="max-w-4xl bg-white border-8 border-black rounded-[40px] overflow-hidden shadow-hard p-10">
                                    <h3 className="text-3xl font-black italic mb-6">ESTUDIANTES CONECTADOS</h3>
                                    <p className="opacity-60 mb-8 font-bold italic">Tus amigos verán los mismos archivos que tú una vez que entren con su Gmail.</p>
                                    <div className="flex items-center gap-4 bg-gray-100 p-6 rounded-3xl border-4 border-black italic">
                                        <div className="w-4 h-4 bg-green-500 rounded-full animate-pulse"></div>
                                        <span className="font-black uppercase">{user.displayName} (Tú)</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
