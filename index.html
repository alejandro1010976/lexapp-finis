<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexApp EMERGENCY RECOVERY</title>
    
    <!-- Cambiamos a púrpura para confirmar que el cambio entró -->
    <style>
        body { background-color: #6b21a8 !important; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        #emergency-log { 
            background: #000; color: #0f0; padding: 20px; border: 5px solid #fff;
            margin-top: 20px; font-family: monospace; font-size: 14px; 
            max-height: 300px; overflow-y: auto; white-space: pre-wrap;
        }
        .btn-login { background: white; color: black; padding: 20px; border-radius: 20px; font-weight: 900; cursor: pointer; border: none; }
    </style>

    <!-- Librerías con versiones específicas para evitar fallos de carga -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="loading-ui">
        <h1 class="text-4xl font-bold mb-4">LEXAPP RECOVERY MODE</h1>
        <p id="status-msg">Iniciando sistema...</p>
        
        <div id="emergency-log">
            > Esperando a JavaScript...
        </div>
    </div>

    <div id="root"></div>

    <script>
        // Sistema de log directo al HTML
        const consoleLog = document.getElementById('emergency-log');
        const statusMsg = document.getElementById('status-msg');
        
        function report(msg, isError = false) {
            const span = document.createElement('div');
            span.style.color = isError ? '#ff4444' : '#00ff00';
            span.innerText = `> ${msg}`;
            consoleLog.appendChild(span);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        window.onerror = function(m, s, l) {
            report(`ERROR CRÍTICO: ${m} en línea ${l}`, true);
            statusMsg.innerText = "EL CÓDIGO FALLÓ. REVISA EL LOG ABAJO.";
        };

        report("Librerías base detectadas.");
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // TUS LLAVES (No tocar una sola coma aquí)
        const firebaseConfig = {
            apiKey: "AIzaSyDW88ZLRlviHhKkem670HHzRTyVSRM3RY8",
            authDomain: "lexapp-60f9b.firebaseapp.com",
            projectId: "lexapp-60f9b",
            storageBucket: "lexapp-60f9b.firebasestorage.app",
            messagingSenderId: "1068688632619",
            appId: "1:1068688632619:web:a36a96895d7ede1645b36e"
        };

        const APP_UID = 'lex-app-finis-2026';

        function App() {
            const [user, setUser] = useState(null);
            const [data, setData] = useState([]);

            useEffect(() => {
                try {
                    report("Inicializando Firebase...");
                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    
                    const auth = firebase.auth();
                    const db = firebase.firestore();

                    auth.onAuthStateChanged(u => {
                        if (u) {
                            report(`Usuario logueado: ${u.displayName || 'Anónimo'}`);
                            setUser(u);
                        } else {
                            report("Sin sesión. Esperando login.", "orange");
                        }
                    });

                    // Cargar algo de data para probar conexión
                    db.collection(`artifacts/${APP_UID}/public/data/biblioteca_col/archivos`)
                      .limit(10)
                      .onSnapshot(snap => {
                          report("Conexión a Base de Datos exitosa.");
                          setData(snap.docs.map(d => d.data()));
                      }, err => report("ERROR DB: " + err.message, true));

                } catch (e) {
                    report("FALLO EN APP: " + e.message, true);
                }

                // Si llegamos aquí, React está vivo
                document.getElementById('loading-ui').classList.add('hidden');
            }, []);

            const login = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                firebase.auth().signInWithPopup(provider).catch(e => report("ERROR LOGIN: " + e.message, true));
            };

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-10 bg-purple-900">
                        <h1 className="text-8xl font-black italic mb-10">LexApp</h1>
                        <div className="bg-white p-10 rounded-[40px] border-8 border-black shadow-[20px_20px_0_0_rgba(0,0,0,1)] text-black text-center">
                            <p className="font-bold mb-6">SISTEMA RECUPERADO</p>
                            <button onClick={login} className="btn-login uppercase italic text-2xl">
                                INGRESAR CON GMAIL
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-white text-black">
                    <nav className="w-80 bg-[#00ced1] border-r-8 border-black p-8 flex flex-col">
                        <h1 className="text-5xl font-black italic mb-10">LexApp</h1>
                        <div className="flex-grow space-y-4 font-black">
                            <div className="p-4 bg-black text-[#00ced1] rounded-xl">BIBLIOTECA</div>
                            <div className="p-4 opacity-30">CONSULTOR (CARGANDO)</div>
                        </div>
                        <div className="mt-auto flex items-center gap-3">
                            <img src={user.photoURL} className="w-12 h-12 rounded-full border-4 border-black" referrerPolicy="no-referrer" />
                            <button onClick={() => firebase.auth().signOut()} className="text-xs font-black uppercase underline">Salir</button>
                        </div>
                    </nav>
                    <main className="flex-grow p-12">
                        <h2 className="text-7xl font-black italic border-b-[10px] border-[#00ced1] inline-block mb-10">NUBE SANTIAGO</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {data.length === 0 ? (
                                <div className="p-10 border-4 border-dashed border-gray-200 rounded-3xl text-gray-300 font-bold">
                                    No hay archivos en la nube todavía.
                                </div>
                            ) : (
                                data.map((item, i) => (
                                    <div key={i} className="p-6 border-4 border-black rounded-3xl bg-[#00ced1] shadow-lg font-black">
                                        {item.titulo}
                                    </div>
                                ))
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
