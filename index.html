<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexApp - Edición Editorial Jurídica</title>
    
    <!-- Librerías Críticas (Carga ultra-rápida) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Versión Estable) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --navy: #002147; 
            --gold: #d4af37;
            --white: #ffffff;
        }
        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--navy); 
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .border-gold { border: 2px solid var(--gold); }
        .shadow-gold { box-shadow: 8px 8px 0px 0px var(--gold); }
        
        /* Previene el pantallazo blanco si React tarda */
        #fallback-loader {
            position: fixed; inset: 0; background: #002147;
            display: flex; flex-direction: column; items-center; justify-content: center;
            z-index: 999; text-align: center;
        }

        .active-tab {
            background-color: var(--gold) !important;
            color: var(--navy) !important;
            transform: scale(1.05);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="fallback-loader">
        <h1 class="text-6xl font-serif italic text-[#d4af37] mb-4">LexApp</h1>
        <p class="uppercase tracking-[0.4em] text-white opacity-50 text-xs">Sincronizando con Santiago...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- TUS LLAVES REALES ---
        const firebaseConfig = {
            apiKey: "AIzaSyDW88ZLRlviHhKkem670HHzRTyVSRM3RY8",
            authDomain: "lexapp-60f9b.firebaseapp.com",
            projectId: "lexapp-60f9b",
            storageBucket: "lexapp-60f9b.firebasestorage.app",
            messagingSenderId: "1068688632619",
            appId: "1:1068688632619:web:a36a96895d7ede1645b36e"
        };

        const APP_UID = 'lex-app-finis-2026';
        let db, auth;

        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (e) { console.error("Firebase Error:", e); }

        function App() {
            const [user, setUser] = useState(null);
            const [status, setStatus] = useState('loading'); // loading, login, ready
            const [tab, setTab] = useState('biblioteca');
            const [data, setData] = useState([]);
            const [msgs, setMsgs] = useState([]);
            const [input, setInput] = useState("");
            const chatEnd = useRef(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setStatus(u ? 'ready' : 'login');
                    document.getElementById('fallback-loader').style.display = 'none';
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (status !== 'ready' || !user) return;
                const path = `artifacts/${APP_UID}/public/data`;
                
                const unsub1 = db.collection(`${path}/biblioteca_col/archivos`)
                    .onSnapshot(snap => {
                        setData(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    });

                const unsub2 = db.collection(`${path}/chat_col/mensajes`)
                    .onSnapshot(snap => {
                        const list = snap.docs.map(d => d.data());
                        list.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                        setMsgs(list);
                    });

                return () => { unsub1(); unsub2(); };
            }, [status, user]);

            useEffect(() => {
                if(chatEnd.current) chatEnd.current.scrollIntoView({ behavior: 'smooth' });
                if(window.lucide) window.lucide.createIcons();
            }, [msgs, tab, status]);

            const login = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(e => alert(e.message));
            };

            const send = async () => {
                if(!input.trim()) return;
                const t = input; setInput("");
                await db.collection(`artifacts/${APP_UID}/public/data/chat_col/mensajes`).add({
                    text: t,
                    user: user.displayName || 'Estudiante',
                    uid: user.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            if (status === 'loading') return null;

            if (status === 'login') return (
                <div className="h-screen w-screen flex flex-col items-center justify-center bg-[#002147] p-8">
                    <h1 className="text-8xl font-serif italic text-[#d4af37] mb-2">LexApp</h1>
                    <p className="text-[#d4af37] tracking-[0.5em] font-black text-xs mb-16 uppercase">Editorial Jurídica Digital</p>
                    
                    <div className="bg-white border-[6px] border-[#d4af37] p-12 rounded-[20px] shadow-gold max-w-sm w-full text-center">
                        <h2 className="text-black font-black text-2xl mb-8 uppercase leading-tight italic">Acceso<br/>Estudiantes</h2>
                        <button onClick={login} className="w-full bg-[#002147] text-[#d4af37] py-5 rounded-xl font-black text-sm shadow-xl hover:scale-105 transition-all flex items-center justify-center gap-3">
                            <i data-lucide="log-in"></i> ENTRAR CON GMAIL
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-white text-black">
                    {/* BARRA LATERAL ESTILO CÓDIGO */}
                    <nav className="w-80 bg-[#002147] border-r-[10px] border-[#d4af37] p-8 flex flex-col z-20">
                        <div className="mb-12 border-b-2 border-[#d4af37]/30 pb-8 text-center">
                            <h1 className="text-5xl font-serif italic text-[#d4af37]">LexApp</h1>
                            <p className="text-[10px] font-black text-white/50 tracking-widest mt-2 uppercase">U. Finis Terrae</p>
                        </div>

                        <div className="space-y-4 flex-grow">
                            {['biblioteca', 'consultor', 'amigos'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`w-full text-left p-4 font-black uppercase text-xs rounded-xl border-2 border-transparent transition-all ${tab === t ? 'active-tab' : 'text-white/60 hover:text-white'}`}>
                                    {t}
                                </button>
                            ))}
                        </div>

                        <div className="mt-auto bg-white/10 p-4 rounded-2xl border border-white/20 flex items-center gap-3">
                            <img src={user.photoURL} className="w-10 h-10 rounded-full border-2 border-[#d4af37]" referrerPolicy="no-referrer" />
                            <div className="truncate">
                                <p className="text-[10px] font-black text-[#d4af37] truncate uppercase">{user.displayName}</p>
                                <button onClick={() => auth.signOut()} className="text-[8px] text-white/50 font-black uppercase hover:underline">Desconectar</button>
                            </div>
                        </div>
                    </nav>

                    {/* ÁREA PRINCIPAL */}
                    <main className="flex-grow p-12 overflow-y-auto bg-gray-50 flex flex-col">
                        <header className="flex justify-between items-end mb-16">
                            <div>
                                <h2 className="text-7xl font-serif italic border-b-[8px] border-[#002147] inline-block leading-none text-[#002147] uppercase font-black">{tab}</h2>
                                <p className="text-[10px] font-black text-gray-300 mt-4 tracking-widest uppercase">Nube Santiago (southamerica-west1)</p>
                            </div>
                            <button className="bg-[#002147] text-[#d4af37] px-8 py-4 rounded-xl font-black shadow-gold hover:-translate-y-1 transition-all uppercase text-xs italic">+ Subir Material</button>
                        </header>

                        <div className="flex-grow animate-up">
                            {tab === 'biblioteca' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {data.length === 0 && <div className="col-span-3 text-center py-20 font-black opacity-10 text-5xl italic uppercase">La biblioteca está vacía</div>}
                                    {data.map(m => (
                                        <div key={m.id} className="p-8 bg-white border-4 border-[#002147] rounded-[30px] shadow-lg hover:shadow-gold transition-all cursor-pointer group">
                                            <span className="bg-[#002147] text-[#d4af37] text-[10px] font-black px-3 py-1 rounded-full uppercase">{m.categoria}</span>
                                            <h3 className="text-3xl font-serif italic mt-6 mb-2 text-black uppercase leading-tight">{m.titulo}</h3>
                                            <p className="text-[9px] font-bold text-gray-400 mt-4 uppercase">Autor: {m.autor}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {tab === 'consultor' && (
                                <div className="h-[600px] flex flex-col border-[6px] border-[#002147] rounded-[40px] overflow-hidden bg-white shadow-gold">
                                    <div className="flex-grow p-8 overflow-y-auto space-y-4">
                                        {msgs.map((m, i) => (
                                            <div key={i} className={`flex ${m.uid === user.uid ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`p-5 rounded-[25px] max-w-[80%] border-2 ${m.uid === user.uid ? 'bg-[#002147] text-white border-[#002147]' : 'bg-gray-100 text-[#002147] border-gray-200'}`}>
                                                    <p className="text-[8px] font-black uppercase opacity-40 mb-1">{m.user}</p>
                                                    <p className="text-sm font-bold">{m.text}</p>
                                                </div>
                                            </div>
                                        ))}
                                        <div ref={chatEnd} />
                                    </div>
                                    <div className="p-6 bg-gray-50 border-t-4 border-[#002147] flex gap-4">
                                        <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && send()} className="flex-grow p-4 rounded-xl border-2 border-gray-200 font-black text-sm uppercase outline-none focus:border-[#d4af37]" placeholder="Escribe a tus colegas..." />
                                        <button onClick={send} className="bg-[#002147] text-[#d4af37] p-5 rounded-xl shadow-lg hover:scale-110 transition-transform"><i data-lucide="send"></i></button>
                                    </div>
                                </div>
                            )}

                            {tab === 'amigos' && (
                                <div className="max-w-3xl bg-[#002147] p-12 rounded-[40px] text-[#d4af37] shadow-gold border-4 border-white">
                                    <h3 className="text-4xl font-serif italic mb-8 uppercase">Comunidad LexApp</h3>
                                    <div className="flex items-center gap-6 bg-white/10 p-6 rounded-2xl border-2 border-[#d4af37]">
                                        <div className="w-5 h-5 bg-[#d4af37] rounded-full animate-pulse shadow-[0_0_15px_#d4af37]"></div>
                                        <span className="font-black uppercase text-xl text-white">{user.displayName} (Online)</span>
                                    </div>
                                    <p className="mt-8 text-xs text-white/40 font-bold uppercase tracking-widest leading-relaxed">
                                        El acceso está restringido a tu red de estudio vía Gmail.
                                    </p>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
