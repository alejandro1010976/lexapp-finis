<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexApp - Rescate de Sistema</title>
    
    <!-- Estilos Críticos (Cargan primero) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #00ced1; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; color: black; }
        #debug-console { 
            background: #000; color: #0f0; font-family: monospace; padding: 15px; 
            border-radius: 10px; font-size: 12px; margin-top: 20px; max-height: 200px; overflow-y: auto;
            border: 4px solid white; display: block;
        }
        .error-box { background: white; border: 10px solid black; padding: 40px; border-radius: 40px; box-shadow: 15px 15px 0px 0px rgba(0,0,0,1); }
        .btn-retry { background: black; color: #00ced1; padding: 20px 40px; border-radius: 20px; font-weight: 900; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. Interfaz de Carga / Emergencia (Visible por defecto) -->
    <div id="loading-screen" class="h-screen flex flex-col items-center justify-center">
        <div class="error-box max-w-2xl w-full text-center">
            <h1 style="font-family: 'Playfair Display', serif;" class="text-6xl mb-4 italic">LexApp</h1>
            <p id="status-text" class="font-black uppercase tracking-widest text-sm mb-6 text-gray-500">Iniciando sistemas de rescate...</p>
            
            <!-- Consola de Logs (Aquí verás qué está fallando) -->
            <div id="debug-console">
                > Esperando ejecución de scripts...<br>
            </div>

            <div id="manual-actions" class="hidden">
                <button onclick="window.location.reload()" class="btn-retry uppercase italic">Reiniciar Página</button>
            </div>
        </div>
    </div>

    <!-- 2. Contenedor de React (Oculto hasta que cargue) -->
    <div id="root"></div>

    <!-- Scripts de Diagnóstico -->
    <script>
        const logger = document.getElementById('debug-console');
        const statusText = document.getElementById('status-text');
        
        function log(msg, color = '#0f0') {
            logger.innerHTML += `<span style="color: ${color}">> ${msg}</span><br>`;
            logger.scrollTop = logger.scrollHeight;
        }

        window.onerror = function(message, source, lineno, colno, error) {
            log(`ERROR DETECTADO: ${message}`, 'red');
            statusText.innerText = "Error en el código JavaScript";
            document.getElementById('manual-actions').classList.remove('hidden');
        };

        log("Cargando librerías externas...");
    </script>

    <!-- Librerías Externas -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        log("Librerías cargadas. Iniciando React...", '#00ced1');

        // LLAVES REALES
        const firebaseConfig = {
            apiKey: "AIzaSyDW88ZLRlviHhKkem670HHzRTyVSRM3RY8",
            authDomain: "lexapp-60f9b.firebaseapp.com",
            projectId: "lexapp-60f9b",
            storageBucket: "lexapp-60f9b.firebasestorage.app",
            messagingSenderId: "1068688632619",
            appId: "1:1068688632619:web:a36a96895d7ede1645b36e",
            measurementId: "G-X9GV8RBH41"
        };

        const APP_ID = 'lex-app-finis-2026';

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');

            useEffect(() => {
                log("Conectando con Firebase Santiago...", 'white');
                try {
                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    const auth = firebase.auth();
                    const db = firebase.firestore();

                    auth.onAuthStateChanged(u => {
                        if (u) {
                            log(`Usuario detectado: ${u.displayName || 'Estudiante'}`, '#0f0');
                            setUser(u);
                        } else {
                            log("Esperando inicio de sesión...", 'orange');
                        }
                    });
                } catch (e) {
                    log("FALLO FIREBASE: " + e.message, 'red');
                }
            }, []);

            const login = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                firebase.auth().signInWithPopup(provider).catch(e => log("ERROR GOOGLE: " + e.message, 'red'));
            };

            // Si llegamos aquí, React está funcionando
            useEffect(() => {
                document.getElementById('loading-screen').style.display = 'none';
            }, []);

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 text-center">
                        <h1 style={{fontFamily: 'Playfair Display'}} className="text-9xl font-black italic mb-4">LexApp</h1>
                        <p className="font-black uppercase tracking-[0.5em] mb-12 opacity-50 text-xs">Nube Santiago Conectada</p>
                        <div className="bg-white border-[10px] border-black p-12 rounded-[60px] shadow-[20px_20px_0_0_rgba(0,0,0,1)] max-w-md w-full">
                            <button onClick={login} className="w-full bg-black text-[#00ced1] py-6 rounded-3xl font-black text-xl shadow-lg hover:scale-105 transition-all uppercase italic">
                                Entrar con Gmail
                            </button>
                            <p className="mt-8 text-[9px] font-black opacity-30 uppercase">ID Proyecto: lexapp-60f9b</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-white text-black overflow-hidden">
                    <nav className="w-80 bg-[#00ced1] border-r-8 border-black p-8 flex flex-col">
                        <h1 className="text-5xl font-serif font-black italic mb-12">LexApp</h1>
                        <div className="space-y-4 flex-grow font-black text-sm uppercase italic">
                            <button className="w-full text-left p-4 bg-black text-[#00ced1] rounded-2xl shadow-hard">Biblioteca</button>
                            <button className="w-full text-left p-4 hover:bg-black/10 rounded-2xl">Consultor IA</button>
                            <button className="w-full text-left p-4 hover:bg-black/10 rounded-2xl">Amigos</button>
                        </div>
                        <div className="mt-auto bg-black p-4 rounded-3xl text-[#00ced1] flex items-center gap-3">
                            <img src={user.photoURL} className="w-10 h-10 rounded-full border-2 border-[#00ced1]" referrerPolicy="no-referrer" />
                            <div className="truncate">
                                <p className="text-[10px] font-black uppercase truncate">{user.displayName}</p>
                                <button onClick={() => firebase.auth().signOut()} className="text-[8px] opacity-60 font-black hover:underline uppercase">Salir</button>
                            </div>
                        </div>
                    </nav>
                    <main className="flex-grow p-12 overflow-y-auto">
                        <h2 className="text-8xl font-serif font-black italic border-b-[15px] border-[#00ced1] inline-block mb-12 uppercase">Nube</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            <div className="p-10 border-8 border-black rounded-[50px] shadow-hard italic font-black text-4xl">
                                <span className="text-xs bg-black text-[#00ced1] px-2 py-1 rounded not-italic">CIVIL</span>
                                <p className="mt-4">BIENES Y REALES</p>
                            </div>
                            <div className="p-10 border-8 border-black rounded-[50px] shadow-hard italic font-black text-4xl opacity-20">
                                + PRÓXIMAMENTE
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
