<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexApp - Finis Terrae</title>
    
    <!-- Librerías con carga garantizada -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        :root { --turquesa: #00ced1; --negro: #000000; --blanco: #ffffff; }
        body { margin: 0; padding: 0; background-color: var(--turquesa); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .shadow-hard { box-shadow: 10px 10px 0px 0px var(--negro); }
        .active-tab { background-color: var(--negro) !important; color: var(--turquesa) !important; transform: translateX(10px); }
        
        #error-overlay {
            position: fixed; inset: 0; background: white; color: red; 
            padding: 40px; z-index: 10000; display: none; font-family: monospace;
        }

        .animate-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <!-- Cuadro de error crítico (Solo se ve si el código falla) -->
    <div id="error-overlay">
        <h1 style="font-size: 30px; font-weight: 900;">ERROR DETECTADO</h1>
        <div id="error-desc" style="margin-top: 20px;"></div>
        <button onclick="location.reload()" style="margin-top: 40px; background: black; color: white; padding: 20px;">REINTENTAR</button>
    </div>

    <!-- Pantalla de Carga Inicial -->
    <div id="boot-loader" style="position: fixed; inset: 0; background: #00ced1; display: flex; flex-direction: column; items-center; justify-content: center; z-index: 999; text-align: center;">
        <h1 class="text-7xl font-serif italic mb-4">LexApp</h1>
        <p class="uppercase tracking-[0.4em] font-black text-xs opacity-50">Conectando con Santiago...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Capturador de errores para mostrar en pantalla
        window.onerror = (m, s, l) => {
            document.getElementById('error-overlay').style.display = 'block';
            document.getElementById('error-desc').innerText = `${m} (Línea: ${l})`;
        };

        // --- TUS LLAVES (Verificadas) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDW88ZLRlviHhKkem670HHzRTyVSRM3RY8",
            authDomain: "lexapp-60f9b.firebaseapp.com",
            projectId: "lexapp-60f9b",
            storageBucket: "lexapp-60f9b.firebasestorage.app",
            messagingSenderId: "1068688632619",
            appId: "1:1068688632619:web:a36a96895d7ede1645b36e"
        };

        const APP_UID = 'lex-app-finis-2026';
        let db, auth;

        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (e) { console.error(e); }

        function App() {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('biblioteca');
            const [data, setData] = useState([]);
            const [msgs, setMsgs] = useState([]);
            const [input, setInput] = useState("");
            const chatEnd = useRef(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                    document.getElementById('boot-loader').style.display = 'none';
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${APP_UID}/public/data`;
                
                const unsub1 = db.collection(`${path}/biblioteca_col/archivos`).onSnapshot(snap => {
                    setData(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });

                const unsub2 = db.collection(`${path}/chat_col/mensajes`).onSnapshot(snap => {
                    const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    list.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                    setMsgs(list);
                });

                return () => { unsub1(); unsub2(); };
            }, [user]);

            useEffect(() => {
                if (chatEnd.current) chatEnd.current.scrollIntoView({ behavior: 'smooth' });
            }, [msgs]);

            const login = () => {
                const p = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(p).catch(e => alert("Error: " + e.message));
            };

            const send = async () => {
                if(!input.trim()) return;
                const t = input; setInput("");
                await db.collection(`artifacts/${APP_UID}/public/data/chat_col/mensajes`).add({
                    text: t, user: user.displayName, uid: user.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const upload = async () => {
                const n = prompt("Nombre de la materia:");
                if(!n) return;
                await db.collection(`artifacts/${APP_UID}/public/data/biblioteca_col/archivos`).add({
                    titulo: n, categoria: "GENERAL", autor: user.displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 text-center bg-[#00ced1]">
                        <h1 className="text-9xl font-serif italic mb-10 animate-up">LexApp</h1>
                        <div className="bg-white border-[10px] border-black p-12 rounded-[60px] shadow-hard max-w-md w-full animate-up">
                            <h2 className="text-2xl font-black uppercase italic mb-8 text-black">Acceso Comunidad</h2>
                            <button onClick={login} className="w-full bg-black text-[#00ced1] py-6 rounded-3xl font-black text-xl shadow-lg hover:scale-105 transition-all uppercase italic">
                                Entrar con Gmail
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-white text-black overflow-hidden animate-up">
                    <nav className="w-80 bg-[#00ced1] border-r-8 border-black p-8 flex flex-col z-20">
                        <h1 className="text-6xl font-serif italic font-black mb-12">LexApp</h1>
                        <div className="space-y-4 flex-grow">
                            {['biblioteca', 'consultor', 'amigos'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`w-full text-left p-5 font-black uppercase text-xs rounded-2xl border-4 border-transparent transition-all ${tab === t ? 'active-tab shadow-hard' : 'hover:border-black'}`}>
                                    {t}
                                </button>
                            ))}
                        </div>
                        <div className="mt-auto bg-black p-4 rounded-3xl flex items-center gap-3 border-2 border-white/10">
                            <img src={user.photoURL} className="w-10 h-10 rounded-full border-2 border-[#00ced1]" referrerPolicy="no-referrer" />
                            <div className="truncate">
                                <p className="text-[10px] font-black text-[#00ced1] uppercase truncate">{user.displayName}</p>
                                <button onClick={() => auth.signOut()} className="text-[8px] text-white opacity-50 font-black hover:underline uppercase">Desconectar</button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow p-12 overflow-y-auto bg-white flex flex-col">
                        <header className="flex justify-between items-end mb-16">
                            <h2 className="text-8xl font-serif font-black italic border-b-[15px] border-[#00ced1] leading-none uppercase">{tab}</h2>
                            <button onClick={upload} className="bg-black text-[#00ced1] px-10 py-5 rounded-3xl font-black shadow-hard hover:-translate-y-1 transition-all uppercase italic">+ SUBIR</button>
                        </header>

                        <div className="flex-grow">
                            {tab === 'biblioteca' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                    {data.length === 0 && <p className="col-span-3 text-center py-20 font-black opacity-10 text-4xl uppercase">Biblioteca Vacía</p>}
                                    {data.map(m => (
                                        <div key={m.id} className="p-10 border-8 border-black rounded-[50px] shadow-hard bg-white">
                                            <span className="bg-black text-[#00ced1] text-[10px] font-black px-3 py-1 rounded uppercase tracking-tighter">APUNTE</span>
                                            <h3 className="text-4xl font-serif italic mt-6 mb-2 uppercase">{m.titulo}</h3>
                                            <p className="text-[9px] font-bold opacity-40 uppercase mt-4">Autor: {m.autor}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {tab === 'consultor' && (
                                <div className="h-[600px] flex flex-col border-8 border-black rounded-[50px] overflow-hidden bg-gray-50 shadow-hard">
                                    <div className="flex-grow p-10 overflow-y-auto space-y-6">
                                        {msgs.map((m, i) => (
                                            <div key={i} className={`flex ${m.uid === user.uid ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`p-6 rounded-[40px] max-w-[85%] border-4 border-black ${m.uid === user.uid ? 'bg-black text-white shadow-xl' : 'bg-[#00ced1] font-bold'}`}>
                                                    <p className="text-[8px] font-black uppercase opacity-40 mb-1">{m.user}</p>
                                                    <p className="text-sm leading-relaxed">{m.text}</p>
                                                </div>
                                            </div>
                                        ))}
                                        <div ref={chatEnd} />
                                    </div>
                                    <div className="p-8 bg-white border-t-8 border-black flex gap-5">
                                        <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && send()} className="flex-grow font-black text-sm uppercase bg-white border-none outline-none" placeholder="Escribe al grupo..." />
                                        <button onClick={send} className="bg-black text-[#00ced1] p-6 rounded-3xl shadow-xl hover:scale-110 transition-transform">ENVIAR</button>
                                    </div>
                                </div>
                            )}

                            {tab === 'amigos' && (
                                <div className="max-w-4xl bg-white border-8 border-black rounded-[60px] p-14 shadow-hard">
                                    <h3 className="text-4xl font-serif italic mb-8 uppercase">Red en tiempo real</h3>
                                    <div className="flex items-center gap-6 bg-[#00ced1] p-8 rounded-3xl border-4 border-black italic">
                                        <div className="w-5 h-5 bg-black rounded-full animate-pulse shadow-[0_0_20px_#00ced1]"></div>
                                        <span className="font-black uppercase text-2xl tracking-tighter">{user.displayName} (Tú)</span>
                                    </div>
                                    <p className="mt-12 text-[10px] font-black opacity-30 uppercase tracking-[0.3em]">Conectado al servidor de Santiago.</p>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
